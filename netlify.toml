[build]
base = "artifacts/cars-in-my-city"
command = "corepack enable && pnpm install --frozen-lockfile=false && pnpm run build"
publish = "dist/public"
[build.environment]
BASE_PATH = "/"
PORT = "3000"
NODE_VERSION = "24"
[functions]
directory = "../../netlify/functions"
node_bundler = "esbuild"
external_node_modules = ["@resvg/resvg-js"]
[[redirects]]
from = "/api/*"
to = "/.netlify/functions/api/api/:splat"
status = 200
force = true
[[redirects]]
from = "/*"
to = "/index.html"
status = 200
